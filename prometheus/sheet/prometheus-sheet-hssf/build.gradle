/* Dependencies */
dependencies {
    implementation project(':prometheus-sheet-api')
    implementation project(':oceanus')
    implementation "org.apache.poi:poi:$apachePOIVersion"
}

/* Description */
group = 'io.github.tonywasher.joceanus.prometheus.sheet'
description = 'Prometheus Sheet HSSF Service'

/* Register the project */
registerProject(project)

/* Specific Manifest details */
jar {
    manifest {
        attributes(manifestAttrs)
    }
}
