/* Standard conventions */
plugins {
    id 'jOceanus-java'
}

/* Dependencies */
dependencies {
    implementation platform(project(':bom'))
    implementation project(':prometheus-sheet-api')
    implementation project(':metis')
    implementation project(':gordianknot')
    implementation project(':tethys-core')
    implementation project(':oceanus')
    testImplementation "org.junit.jupiter:junit-jupiter"
    runtimeOnly "com.mysql:mysql-connector-j"
    runtimeOnly "org.mariadb.jdbc:mariadb-java-client"
    runtimeOnly "org.postgresql:postgresql"
    runtimeOnly "com.microsoft.sqlserver:mssql-jdbc"
    runtimeOnly "com.h2database:h2"
    runtimeOnly project(':prometheus-sheet-hssf')
    runtimeOnly project(':prometheus-sheet-odf')
}

/* Description */
group = 'io.github.tonywasher.joceanus.prometheus'
description = 'Prometheus Core Application Framework'

/* Register the project */
registerProject(project)

/* Test jar details */
tasks.register('testsJar', Jar) {
    archiveClassifier = 'tests'
    from(sourceSets.test.output)
}
publishing.publications.maven.artifact(testsJar)
