/* Standard conventions */
plugins {
    id 'jOceanus-java'
}

/* Dependencies */
dependencies {
    implementation platform(project(':bom'))
    implementation project(':tethys-core')
    implementation project(':oceanus')
    implementation "org.jfree:jfreechart"
}

/* Description */
group = 'io.github.tonywasher.joceanus.tethys'
description = 'Tethys Java Swing Utilities'

/* Register the project */
registerProject(project)

/* Specific Manifest details */
jar {
    manifest {
        attributes(manifestAttrs)
    }
}
