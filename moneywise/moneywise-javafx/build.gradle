/* JavaFX specific */
plugins {
    id 'org.openjfx.javafxplugin' version "$javaFXPluginVersion"
    id 'jOceanus-java'
    id 'jOceanus-javafx'
}

/* Dependencies */
dependencies {
    implementation project(':moneywise-core')
    implementation project(':tethys-javafx')
    implementation project(':tethys-core')
    implementation project(':oceanus')
}

/* Details */
group = 'io.github.tonywasher.joceanus.moneywise'
description = 'MoneyWise Personal Finance - javaFX'
mainClass = "io.github.tonywasher.joceanus.moneywise.ui.javafx.MoneyWise4FX"
moduleName = "io.github.tonywasher.joceanus.moneywise.javafx"
preLoaderClass = "io.github.tonywasher.joceanus.moneywise.ui.javafx.MoneyWiseFXpreLoader"

/* Register the project */
registerProject(project)

/* Specific Manifest details */
jar {
    manifest {
        attributes(manifestAttrs)
    }
}
