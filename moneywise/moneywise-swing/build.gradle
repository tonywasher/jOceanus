/* Standard conventions */
plugins {
    id 'jOceanus-java'
}

/* Dependencies */
dependencies {
    implementation platform(project(':bom'))
    implementation project(':moneywise-core')
    implementation project(':tethys-swing')
    implementation project(':tethys-core')
    implementation project(':oceanus')
}

/* Details */
group = 'io.github.tonywasher.joceanus.moneywise'
description = 'MoneyWise Personal Finance - Swing'
mainClass = "io.github.tonywasher.joceanus.moneywise.ui.swing.MoneyWise4Swing"
moduleName = "io.github.tonywasher.joceanus.moneywise.swing"
splashScreen = "io/github/tonywasher/joceanus/moneywise/ui/icons/swing/MoneyWiseSplash.png"

/* Register the project */
registerProject(project)
